<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif" role="img" aria-label="Applications are volatile; every one that wins pays the inference infrastructure layer beneath it">
  <defs>
    <linearGradient id="cs-infra" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="55%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="560" fill="#111118"/>
  <rect x="0.5" y="0.5" width="999" height="559" fill="none" stroke="#2a323c"/>

  <text x="60" y="62" font-size="30" font-weight="bold" fill="#eaedf0">Value accrues to the layer everyone pays</text>
  <text x="60" y="94" font-size="16" fill="#8b96a3">You can't pick which app wins — but every winner pays the compute layer</text>

  <!-- Application layer: a row of boxes, some winners, some faded -->
  <text x="60" y="150" font-size="13" font-weight="bold" letter-spacing="1.5" fill="#8b96a3">APPLICATION LAYER — volatile</text>
  <g>
    <rect x="60" y="166" width="130" height="72" rx="10" fill="#1a1a24" stroke="#2a323c"/>
    <rect x="205" y="166" width="130" height="72" rx="10" fill="#1e1b3a" stroke="#8b5cf6"/>
    <rect x="350" y="166" width="130" height="72" rx="10" fill="#1a1a24" stroke="#2a323c" opacity="0.5"/>
    <rect x="495" y="166" width="130" height="72" rx="10" fill="#12303a" stroke="#22d3ee"/>
    <rect x="640" y="166" width="130" height="72" rx="10" fill="#1a1a24" stroke="#2a323c" opacity="0.5"/>
    <rect x="785" y="166" width="130" height="72" rx="10" fill="#1e1b3a" stroke="#8b5cf6"/>
  </g>
  <text x="125" y="207" text-anchor="middle" font-size="13" fill="#5e6975">fails</text>
  <text x="270" y="207" text-anchor="middle" font-size="13" font-weight="bold" fill="#c4b5fd">winner</text>
  <text x="415" y="207" text-anchor="middle" font-size="13" fill="#5e6975">fails</text>
  <text x="560" y="207" text-anchor="middle" font-size="13" font-weight="bold" fill="#67e8f9">winner</text>
  <text x="705" y="207" text-anchor="middle" font-size="13" fill="#5e6975">fails</text>
  <text x="850" y="207" text-anchor="middle" font-size="13" font-weight="bold" fill="#c4b5fd">winner</text>

  <!-- arrows down: every winner pays down -->
  <g stroke="#67e8f9" stroke-width="2.5" fill="#67e8f9">
    <line x1="270" y1="246" x2="270" y2="320"/>
    <path d="M264 314 L 270 326 L 276 314 Z"/>
    <line x1="560" y1="246" x2="560" y2="320"/>
    <path d="M554 314 L 560 326 L 566 314 Z"/>
    <line x1="850" y1="246" x2="850" y2="320"/>
    <path d="M844 314 L 850 326 L 856 314 Z"/>
  </g>
  <text x="500" y="292" text-anchor="middle" font-size="14" font-style="italic" fill="#8b96a3">every request is a tithe paid downward</text>

  <!-- Infrastructure layer: one solid wide bar -->
  <rect x="60" y="340" width="880" height="118" rx="14" fill="url(#cs-infra)"/>
  <text x="500" y="392" text-anchor="middle" font-size="24" font-weight="bold" fill="#ffffff">INFERENCE INFRASTRUCTURE</text>
  <text x="500" y="422" text-anchor="middle" font-size="15" fill="#f1f5ff">taxes every winner — grows with the whole software industry</text>

  <!-- the cheque -->
  <rect x="60" y="486" width="880" height="46" rx="10" fill="#1a1a24" stroke="#2a323c"/>
  <text x="500" y="515" text-anchor="middle" font-size="15" fill="#eaedf0">Together AI's Series C: <tspan font-weight="bold" fill="#a78bfa">$800M</tspan> raised at an <tspan font-weight="bold" fill="#67e8f9">$8.3B</tspan> valuation</text>
</svg>
