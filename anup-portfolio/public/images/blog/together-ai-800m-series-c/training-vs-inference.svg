<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif" role="img" aria-label="Training is a one-time spike; inference is a recurring, compounding cost">
  <defs>
    <linearGradient id="tvi-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="tvi-cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="560" fill="#111118"/>
  <rect x="0.5" y="0.5" width="999" height="559" fill="none" stroke="#2a323c"/>

  <text x="60" y="66" font-size="30" font-weight="bold" fill="#eaedf0">Training is a spike. Inference never stops.</text>
  <text x="60" y="98" font-size="16" fill="#8b96a3">Where the compute money actually goes over a product's life</text>

  <!-- baseline -->
  <line x1="60" y1="470" x2="940" y2="470" stroke="#2a323c" stroke-width="2"/>

  <!-- TRAINING: one big one-time bar -->
  <rect x="96" y="188" width="120" height="282" rx="6" fill="url(#tvi-violet)"/>
  <text x="156" y="510" text-anchor="middle" font-size="17" font-weight="bold" fill="#c4b5fd">TRAINING</text>
  <text x="156" y="533" text-anchor="middle" font-size="14" fill="#8b96a3">one-time</text>

  <!-- divider -->
  <line x1="300" y1="150" x2="300" y2="470" stroke="#232a33" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- INFERENCE: many small, compounding bars -->
  <g fill="url(#tvi-cyan)">
    <rect x="360" y="440" width="34" height="30" rx="4"/>
    <rect x="404" y="428" width="34" height="42" rx="4"/>
    <rect x="448" y="412" width="34" height="58" rx="4"/>
    <rect x="492" y="392" width="34" height="78" rx="4"/>
    <rect x="536" y="368" width="34" height="102" rx="4"/>
    <rect x="580" y="340" width="34" height="130" rx="4"/>
    <rect x="624" y="308" width="34" height="162" rx="4"/>
    <rect x="668" y="272" width="34" height="198" rx="4"/>
    <rect x="712" y="232" width="34" height="238" rx="4"/>
    <rect x="756" y="190" width="34" height="280" rx="4"/>
    <rect x="800" y="150" width="34" height="320" rx="4"/>
    <rect x="844" y="112" width="34" height="358" rx="4"/>
  </g>
  <!-- trend arrow -->
  <path d="M360 452 C 520 430 720 300 892 120" fill="none" stroke="#67e8f9" stroke-width="2.5" stroke-dasharray="2 7" stroke-linecap="round"/>
  <path d="M886 108 L 898 118 L 883 124 Z" fill="#67e8f9"/>

  <text x="630" y="510" text-anchor="middle" font-size="17" font-weight="bold" fill="#67e8f9">INFERENCE</text>
  <text x="630" y="533" text-anchor="middle" font-size="14" fill="#8b96a3">every request — forever, and compounding</text>
</svg>
