<svg viewBox="0 0 1000 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif" role="img" aria-label="Nearly 80 percent of global startup funding went to US companies in 2026, and four Q1 mega-rounds alone were 65 percent of global venture investment">
  <defs>
    <linearGradient id="fc-us" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6d28d9"/><stop offset="55%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="520" fill="#111118"/>
  <rect x="0.5" y="0.5" width="999" height="519" fill="none" stroke="#2a323c"/>

  <text x="60" y="62" font-size="30" font-weight="bold" fill="#eaedf0">Where the money pooled in 2026</text>
  <text x="60" y="94" font-size="16" fill="#8b96a3">Global seed-through-growth funding, share by geography (Crunchbase data)</text>

  <!-- main bar -->
  <rect x="60" y="150" width="704" height="86" rx="12" fill="url(#fc-us)"/>
  <rect x="772" y="150" width="168" height="86" rx="12" fill="#1a1a24" stroke="#2a323c"/>
  <text x="412" y="188" text-anchor="middle" font-size="24" font-weight="bold" fill="#ffffff">UNITED STATES ~80%</text>
  <text x="412" y="216" text-anchor="middle" font-size="13" fill="#f1f5ff">most of it into a handful of AI labs</text>
  <text x="856" y="188" text-anchor="middle" font-size="16" font-weight="bold" fill="#8b96a3">REST OF</text>
  <text x="856" y="212" text-anchor="middle" font-size="16" font-weight="bold" fill="#8b96a3">WORLD ~20%</text>

  <!-- mega rounds -->
  <text x="60" y="296" font-size="13" font-weight="bold" letter-spacing="1.5" fill="#8b96a3">HOW A STATISTIC GETS BENT — Q1 2026, FOUR ROUNDS = 65% OF ALL GLOBAL VC</text>
  <g>
    <rect x="60" y="314" width="360" height="70" rx="12" fill="#1e1b3a" stroke="#8b5cf6"/>
    <text x="240" y="344" text-anchor="middle" font-size="16" font-weight="bold" fill="#c4b5fd">OpenAI — $122B</text>
    <text x="240" y="368" text-anchor="middle" font-size="12" fill="#8b96a3">largest venture round ever recorded</text>

    <rect x="440" y="314" width="180" height="70" rx="12" fill="#1e1b3a" stroke="#8b5cf6"/>
    <text x="530" y="344" text-anchor="middle" font-size="15" font-weight="bold" fill="#c4b5fd">Anthropic</text>
    <text x="530" y="368" text-anchor="middle" font-size="13" fill="#8b96a3">$30B</text>

    <rect x="640" y="314" width="150" height="70" rx="12" fill="#12303a" stroke="#22d3ee"/>
    <text x="715" y="344" text-anchor="middle" font-size="15" font-weight="bold" fill="#67e8f9">xAI</text>
    <text x="715" y="368" text-anchor="middle" font-size="13" fill="#8b96a3">$20B</text>

    <rect x="810" y="314" width="130" height="70" rx="12" fill="#12303a" stroke="#22d3ee"/>
    <text x="875" y="344" text-anchor="middle" font-size="15" font-weight="bold" fill="#67e8f9">Waymo</text>
    <text x="875" y="368" text-anchor="middle" font-size="13" fill="#8b96a3">$16B</text>
  </g>

  <rect x="60" y="416" width="880" height="60" rx="12" fill="#1a1a24" stroke="#2a323c"/>
  <text x="500" y="442" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#eaedf0">Funding share ≠ innovation share.</text>
  <text x="500" y="464" text-anchor="middle" font-size="13.5" fill="#8b96a3">The number measures where capital feels safe — not where good software can be built.</text>
</svg>
