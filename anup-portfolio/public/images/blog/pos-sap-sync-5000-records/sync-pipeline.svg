<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif" role="img" aria-label="POS to SAP sync pipeline: normalize, validate, quarantine, idempotent upsert, retries with backoff, dead-letter workbench with replay">
  <defs>
    <linearGradient id="sp-sap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6d28d9"/><stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="560" fill="#111118"/>
  <rect x="0.5" y="0.5" width="999" height="559" fill="none" stroke="#2a323c"/>

  <text x="60" y="62" font-size="30" font-weight="bold" fill="#eaedf0">The pipeline that let me sleep</text>
  <text x="60" y="94" font-size="16" fill="#8b96a3">5,000+ records a day: validate early, quarantine with reasons, retry only the transient</text>

  <!-- top row -->
  <rect x="60" y="140" width="150" height="72" rx="12" fill="#1a1a24" stroke="#2a323c"/>
  <text x="135" y="170" text-anchor="middle" font-size="15" font-weight="bold" fill="#eaedf0">POS stores</text>
  <text x="135" y="192" text-anchor="middle" font-size="12" fill="#8b96a3">5,000+ rec/day</text>

  <rect x="262" y="140" width="150" height="72" rx="12" fill="#1e1b3a" stroke="#8b5cf6"/>
  <text x="337" y="170" text-anchor="middle" font-size="15" font-weight="bold" fill="#c4b5fd">Normalize</text>
  <text x="337" y="192" text-anchor="middle" font-size="12" fill="#8b96a3">units · codes · trims</text>

  <rect x="464" y="140" width="150" height="72" rx="12" fill="#1e1b3a" stroke="#8b5cf6"/>
  <text x="539" y="170" text-anchor="middle" font-size="15" font-weight="bold" fill="#c4b5fd">Validate</text>
  <text x="539" y="192" text-anchor="middle" font-size="12" fill="#8b96a3">machine-readable issues</text>

  <rect x="666" y="140" width="170" height="72" rx="12" fill="#12303a" stroke="#22d3ee"/>
  <text x="751" y="170" text-anchor="middle" font-size="15" font-weight="bold" fill="#67e8f9">Upsert PENDING</text>
  <text x="751" y="192" text-anchor="middle" font-size="12" fill="#8b96a3">idempotent sourceKey</text>

  <g stroke="#5e6975" stroke-width="2.5" fill="#5e6975">
    <line x1="210" y1="176" x2="250" y2="176"/><path d="M244 170 L 256 176 L 244 182 Z"/>
    <line x1="412" y1="176" x2="452" y2="176"/><path d="M446 170 L 458 176 L 446 182 Z"/>
    <line x1="614" y1="176" x2="654" y2="176"/><path d="M648 170 L 660 176 L 648 182 Z"/>
  </g>

  <!-- quarantine drop -->
  <g stroke="#f59e0b" stroke-width="2.5" fill="#f59e0b">
    <line x1="539" y1="212" x2="539" y2="252"/><path d="M533 246 L 539 258 L 545 246 Z"/>
  </g>
  <rect x="434" y="262" width="210" height="64" rx="12" fill="#2b1f0d" stroke="#f59e0b"/>
  <text x="539" y="290" text-anchor="middle" font-size="15" font-weight="bold" fill="#fbbf24">Quarantine</text>
  <text x="539" y="312" text-anchor="middle" font-size="12" fill="#c9a35c">reason attached · fixed at source</text>
  <text x="560" y="240" font-size="11" fill="#f59e0b">fails</text>

  <!-- SAP push -->
  <g stroke="#67e8f9" stroke-width="2.5" fill="#67e8f9">
    <line x1="751" y1="212" x2="751" y2="252"/><path d="M745 246 L 751 258 L 757 246 Z"/>
  </g>
  <rect x="666" y="262" width="274" height="76" rx="12" fill="url(#sp-sap)"/>
  <text x="803" y="294" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">Push to SAP</text>
  <text x="803" y="318" text-anchor="middle" font-size="12.5" fill="#f1f5ff">transient → retry · backoff + jitter · capped</text>

  <!-- dead letter -->
  <g stroke="#f87171" stroke-width="2.5" fill="#f87171">
    <line x1="803" y1="338" x2="803" y2="378"/><path d="M797 372 L 803 384 L 809 372 Z"/>
  </g>
  <rect x="628" y="388" width="312" height="76" rx="12" fill="#2b1216" stroke="#f87171"/>
  <text x="784" y="418" text-anchor="middle" font-size="15" font-weight="bold" fill="#fda4af">Dead-letter table — a workbench</text>
  <text x="784" y="442" text-anchor="middle" font-size="12.5" fill="#c98a90">full payload · error history · re-run button</text>

  <!-- replay loop -->
  <path d="M628 426 C 480 426 400 350 655 300" fill="none" stroke="#34d399" stroke-width="2.5" stroke-dasharray="3 7" stroke-linecap="round"/>
  <path d="M648 292 L 662 298 L 650 308 Z" fill="#34d399"/>
  <text x="430" y="400" font-size="13" font-style="italic" fill="#34d399">replay is always safe — every write is an upsert</text>

  <text x="60" y="522" font-size="14" font-style="italic" fill="#8b96a3">Design for dirty data, duplicates, timeouts, and partial failures as steady-state inputs — not surprises.</text>
</svg>
