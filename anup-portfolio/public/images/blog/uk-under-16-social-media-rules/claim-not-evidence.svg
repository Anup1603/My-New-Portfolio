<svg viewBox="0 0 1000 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif" role="img" aria-label="Privacy-preserving age verification: a dedicated verifier keeps the evidence and passes the platform only a signed age claim">
  <defs>
    <linearGradient id="cne-claim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6d28d9"/><stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="520" fill="#111118"/>
  <rect x="0.5" y="0.5" width="999" height="519" fill="none" stroke="#2a323c"/>

  <text x="60" y="62" font-size="30" font-weight="bold" fill="#eaedf0">Store the claim, not the evidence</text>
  <text x="60" y="94" font-size="16" fill="#8b96a3">The one architecture idea worth stealing from the age-verification wave</text>

  <!-- user -->
  <rect x="60" y="200" width="150" height="90" rx="14" fill="#1a1a24" stroke="#2a323c"/>
  <text x="135" y="238" text-anchor="middle" font-size="16" font-weight="bold" fill="#eaedf0">User</text>
  <text x="135" y="262" text-anchor="middle" font-size="12" fill="#8b96a3">proves their age once</text>

  <g stroke="#5e6975" stroke-width="2.5" fill="#5e6975">
    <line x1="210" y1="245" x2="252" y2="245"/><path d="M246 239 L 258 245 L 246 251 Z"/>
  </g>

  <!-- verifier -->
  <rect x="262" y="150" width="300" height="200" rx="16" fill="#1e1b3a" stroke="#8b5cf6"/>
  <text x="412" y="186" text-anchor="middle" font-size="17" font-weight="bold" fill="#c4b5fd">DEDICATED VERIFIER</text>
  <g font-size="13.5" fill="#eaedf0" text-anchor="middle">
    <text x="412" y="218">government ID check</text>
    <text x="412" y="244">facial age estimation</text>
    <text x="412" y="270">bank / carrier signal · parental flow</text>
  </g>
  <rect x="288" y="292" width="248" height="38" rx="8" fill="#2b1216" stroke="#f87171"/>
  <text x="412" y="316" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#fda4af">EVIDENCE STAYS HERE — never leaves</text>

  <!-- signed assertion -->
  <g stroke="#67e8f9" stroke-width="2.5" fill="#67e8f9">
    <line x1="562" y1="245" x2="616" y2="245"/><path d="M610 239 L 622 245 L 610 251 Z"/>
  </g>
  <rect x="596" y="216" width="120" height="58" rx="29" fill="url(#cne-claim)"/>
  <text x="656" y="242" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">16+ ✓</text>
  <text x="656" y="262" text-anchor="middle" font-size="10.5" fill="#f1f5ff">signed assertion</text>

  <g stroke="#5e6975" stroke-width="2.5" fill="#5e6975">
    <line x1="716" y1="245" x2="758" y2="245"/><path d="M752 239 L 764 245 L 752 251 Z"/>
  </g>

  <!-- platform -->
  <rect x="768" y="170" width="172" height="160" rx="16" fill="#12303a" stroke="#22d3ee"/>
  <text x="854" y="208" text-anchor="middle" font-size="16" font-weight="bold" fill="#67e8f9">YOUR PLATFORM</text>
  <g font-size="12.5" fill="#eaedf0" text-anchor="middle">
    <text x="854" y="240">stores the claim only:</text>
    <text x="854" y="264" font-family="monospace">verified: true</text>
    <text x="854" y="288" font-family="monospace">band: 16+</text>
  </g>
  <text x="854" y="316" text-anchor="middle" font-size="11.5" font-style="italic" fill="#8b96a3">no documents, no biometrics</text>

  <rect x="60" y="392" width="880" height="66" rx="12" fill="#1a1a24" stroke="#2a323c"/>
  <text x="500" y="420" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#eaedf0">The design goal for a breach of your platform:</text>
  <text x="500" y="444" text-anchor="middle" font-size="14" fill="#8b96a3">it reveals that a user was verified — but nothing about how.</text>
</svg>
